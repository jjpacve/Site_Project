<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты теста - Kazakh Quiz</title>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <script src="/scripts/theme.js?v=20260410d"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        html, body {
            margin: 0;
            min-height: 100%;
            overflow: auto;
            background: #1c2b8c;
        }

        body {
            background: #1c2b8c;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .results-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .back-link {
            color: #ddd;
            text-decoration: none;
            font-weight: bold;
        }

        .test-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .test-meta {
            color: #d6d6d6;
            margin-bottom: 30px;
        }

        .summary-card {
            background: #2c2c2c;
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .summary-count {
            font-size: 18px;
            color: #90ee90;
            margin-top: 10px;
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-card {
            background: #2c2c2c;
            border-radius: 18px;
            padding: 22px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .result-main {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .student-name {
            font-size: 22px;
            font-weight: bold;
        }

        .student-meta {
            color: #cbd5e1;
            font-size: 15px;
        }

        .score-badge {
            background: #14532d;
            color: #dcfce7;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 18px;
            font-weight: bold;
            white-space: nowrap;
        }

        .pending-badge {
            background: #1d4ed8;
            color: #dbeafe;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .toggle-details-btn,
        .review-btn {
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .toggle-details-btn {
            background: #2563eb;
            color: white;
        }

        .review-btn.approve {
            background: #15803d;
            color: white;
        }

        .review-btn.reject {
            background: #b91c1c;
            color: white;
        }

        .details-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .detail-card {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 16px;
        }

        .detail-card.correct {
            border: 1px solid rgba(74, 222, 128, 0.35);
        }

        .detail-card.wrong {
            border: 1px solid rgba(248, 113, 113, 0.35);
        }

        .detail-card.pending {
            border: 1px solid rgba(96, 165, 250, 0.35);
        }

        .detail-question {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-meta {
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.6;
        }

        .results-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .results-tab {
            border: none;
            border-radius: 999px;
            padding: 11px 16px;
            background: #334155;
            color: #dbeafe;
            font-weight: 800;
            cursor: pointer;
        }

        .results-tab.active {
            background: #2563eb;
            color: #ffffff;
        }

        .retake-status {
            display: inline-flex;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.18);
            color: #bfdbfe;
            font-weight: 800;
            width: fit-content;
        }

        .loading-text,
        .error-text,
        .empty-text {
            font-size: 22px;
            text-align: center;
            margin-top: 80px;
        }

        .error-text {
            color: #ffb3b3;
        }

        @media (max-width: 800px) {
            .results-container {
                padding: 28px 14px 56px;
            }

            .test-title {
                font-size: 28px;
            }

            .result-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .score-badge {
                width: 100%;
                text-align: center;
            }

            .result-actions,
            .result-actions button,
            .review-btn,
            .toggle-details-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="results-container">
        <div class="top-bar">
            <a href="/pages/home.html" class="back-link">← Назад</a>
        </div>

        <div id="loadingText" class="loading-text">Загрузка результатов...</div>
        <div id="errorText" class="error-text" style="display:none;"></div>

        <div id="resultsContent" style="display:none;">
            <div class="test-title" id="testTitle">Результаты теста</div>
            <div class="test-meta" id="testMeta"></div>

            <div class="summary-card">
                <div>Здесь собраны все прохождения выбранного теста.</div>
                <div id="summaryCount" class="summary-count"></div>
            </div>

            <div class="results-tabs">
                <button type="button" id="resultsTabBtn" class="results-tab active">Результаты</button>
                <button type="button" id="retakesTabBtn" class="results-tab">Повторные попытки</button>
            </div>

            <div id="resultsPanel" class="results-panel">
                <div id="emptyText" class="empty-text" style="display:none;">Пока никто не прошёл этот тест.</div>
                <div id="resultsList" class="results-list"></div>
            </div>
            <div id="retakesPanel" class="results-panel" style="display:none;">
                <div id="retakeEmptyText" class="empty-text" style="display:none;">Пока нет заявок на повторную попытку.</div>
                <div id="retakeRequestsList" class="results-list"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="/scripts/firebase-init.js?v=20260415a"></script>
    <script src="/scripts/ui.js"></script>
    <script src="/scripts/test-security.js?v=20260410a"></script>
    <script src="/scripts/results.js?v=20260413a"></script>
</body>
</html>
