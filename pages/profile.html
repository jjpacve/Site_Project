<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Kazakh Quiz</title>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <script src="/scripts/theme.js?v=20260410d"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; overflow-x: hidden; font-family: sans-serif; background-color: #000; }
        .main-wrapper { display: flex; width: 100%; min-height: 100vh; }
        .side-menu { width: 140px; background: linear-gradient(180deg, #151515 0%, #101010 100%); display: flex; flex-direction: column; align-items: center; padding: 100px 16px 24px; gap: 120px; flex-shrink: 0; box-shadow: 16px 0 38px rgba(0,0,0,0.22); }
        .side-menu a { text-decoration: none; color: #fff; font-size: 26px; font-weight: bold; transform: rotate(-90deg); white-space: nowrap; transition: 0.3s; }
        .content-area { flex-grow: 1; background: radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 20%), linear-gradient(to bottom, #111b66, #1c2b8c); display: flex; justify-content: center; align-items: center; padding: 40px; min-width: 0; }
        
        .profile-card { width: 800px; background: linear-gradient(180deg, #262626 0%, #1f1f1f 100%); border-radius: 24px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.34); border: 1px solid rgba(255,255,255,0.08); }
        .profile-header { min-height: 170px; background: linear-gradient(180deg, #606977 0%, #252525 100%); display: flex; align-items: center; padding: 24px 40px; position: relative; gap: 24px; }
        .avatar-stack { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .avatar-circle { width: 112px; height: 112px; background-color: #ccc; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid #444; overflow: hidden; flex-shrink: 0; }
        .avatar-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        .avatar-placeholder { width: 54px; opacity: 0.6; }
        .avatar-btn { background: linear-gradient(180deg, #3575ff 0%, #1d4ed8 100%); color: #fff; border: none; border-radius: 999px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24); }
        .avatar-btn:hover { background: #1d4ed8; }
        .user-header-info { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
        .user-name-label { color: #fff; font-size: 34px; font-weight: bold; word-break: break-word; }
        .user-login-label { color: #cbd5e1; font-size: 16px; word-break: break-word; }
        
        .profile-body { padding: 50px; display: flex; flex-direction: column; gap: 35px; }
        .info-group { display: flex; flex-direction: column; gap: 10px; position: relative; }
        .info-label { color: #aaa; font-size: 20px; }
        
        .input-wrapper { position: relative; width: 450px; }
        .info-value { width: 100%; background: linear-gradient(180deg, #373737 0%, #2f2f2f 100%); color: #fff; padding: 15px 25px; border-radius: 30px; font-size: 22px; border: 1px solid #444; outline: none; box-shadow: inset 0 2px 10px rgba(255,255,255,0.03); transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .info-value:focus { border-color: #7a8cf9; box-shadow: 0 0 0 4px rgba(122, 140, 249, 0.14), inset 0 2px 10px rgba(255,255,255,0.04); }
        .info-value:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .eye-btn { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; background: none; border: none; color: #7a8cf9; }
        
        .change-btn { background: linear-gradient(180deg, #58c15d 0%, #45a049 100%); color: #fff; border: none; padding: 12px 30px; border-radius: 20px; font-size: 18px; cursor: pointer; margin-top: 10px; width: fit-content; transition: 0.3s; box-shadow: 0 16px 28px rgba(76, 175, 80, 0.22); }
        .change-btn:hover { background-color: #45a049; transform: translateY(-2px); }

        .toast-container { position: fixed; top: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 99999; }
        .toast { min-width: 280px; max-width: 420px; padding: 16px 18px; border-radius: 16px; color: #fff; font-size: 16px; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.25); opacity: 0; transform: translateX(30px); transition: all 0.3s ease; }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { background: linear-gradient(135deg, #2e7d32, #43a047); }
        .toast.error { background: linear-gradient(135deg, #c62828, #e53935); }
        .toast.info { background: linear-gradient(135deg, #1565c0, #1e88e5); }

        @media (max-width: 900px) {
            .main-wrapper {
                flex-direction: column;
            }

            .side-menu {
                width: 100%;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                gap: 12px;
                padding: 16px;
                flex-wrap: wrap;
            }

            .side-menu a {
                transform: none;
                font-size: 18px;
                background: rgba(255,255,255,0.08);
                padding: 10px 16px;
                border-radius: 999px;
            }

            .content-area {
                padding: 20px 16px 32px;
                align-items: stretch;
                justify-content: flex-start;
            }

            .profile-card {
                width: 100%;
            }

            .profile-header {
                height: auto;
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 16px;
                padding: 24px 20px;
            }

            .user-name-label {
                margin-left: 0;
                font-size: 26px;
                word-break: break-word;
            }

            .profile-body {
                padding: 24px 20px;
                gap: 24px;
            }

            .input-wrapper {
                width: 100%;
            }

            .info-value {
                font-size: 18px;
                padding: 14px 18px;
            }

            .change-btn {
                width: 100%;
            }

            .avatar-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="side-menu">
            <a href="/pages/home.html">Главная</a>
            <a href="/pages/about.html">О нас</a>
        </div>
        <div class="content-area">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar-stack">
                        <div class="avatar-circle">
                            <img id="avatarImage" class="avatar-image" alt="Аватар пользователя">
                        </div>
                        <button type="button" id="changeAvatarBtn" class="avatar-btn">Сменить аватар</button>
                        <input type="file" id="avatarInput" accept="image/*" style="display:none;">
                    </div>
                    <div class="user-header-info">
                        <div class="user-name-label" id="userNameTop">Загрузка...</div>
                        <div class="user-login-label" id="userLoginTop"></div>
                    </div>
                </div>
                <div class="profile-body">
                    <div class="info-group">
                        <div class="info-label">Никнейм</div>
                        <div class="input-wrapper">
                            <input type="text" id="displayNickname" class="info-value" placeholder="Введите никнейм" maxlength="32">
                        </div>
                    </div>
                    <div class="info-group">
                        <div class="info-label">Логин</div>
                        <div class="input-wrapper">
                            <input type="text" id="displayLogin" class="info-value" disabled>
                        </div>
                    </div>
                    <div class="info-group">
                        <div class="info-label">Пароль</div>
                        <div class="input-wrapper">
                            <input type="password" id="displayPassword" class="info-value" placeholder="Введите новый пароль" autocomplete="new-password">
                            <button class="eye-btn" id="togglePassword">👁️</button>
                        </div>
                        <div style="color:#9ca3af; font-size:15px;">
                            Текущий пароль не отображается: Firebase не позволяет его читать. Здесь можно только задать новый.
                        </div>
                    </div>
                    <button class="change-btn" id="saveChanges">Сохранить изменения</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/scripts/firebase-init.js?v=20260415a"></script>

    <script>
        const DEFAULT_AVATAR =
            "https://cdn-icons-png.flaticon.com/512/685/685655.png";

        function ensureToastContainer() {
            let c = document.getElementById("toastContainer");
            if (!c) { c = document.createElement("div"); c.id = "toastContainer"; c.className = "toast-container"; document.body.appendChild(c); }
            return c;
        }
        function showToast(message, type = "info") {
            const container = ensureToastContainer();
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add("show"));
            setTimeout(() => { toast.classList.remove("show"); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function getDefaultNickname(user, userData = {}) {
            return userData.nickname ||
                userData.name ||
                user.displayName ||
                user.email?.split("@")[0] ||
                "Пользователь";
        }

        function getAvatarSource(user, userData = {}) {
            return userData.avatarDataUrl ||
                userData.photoURL ||
                user.photoURL ||
                DEFAULT_AVATAR;
        }

        function renderProfileHeader(user, userData = {}) {
            const nickname = getDefaultNickname(user, userData);
            const login = userData.email || user.email || "";
            const avatarImage = document.getElementById('avatarImage');

            document.getElementById('userNameTop').innerText = nickname;
            document.getElementById('userLoginTop').innerText = login;
            document.getElementById('displayNickname').value = nickname;
            document.getElementById('displayLogin').value = login;

            avatarImage.src = getAvatarSource(user, userData);
            avatarImage.onerror = () => {
                avatarImage.src = DEFAULT_AVATAR;
            };
        }

        async function compressImageToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        const maxSize = 256;
                        const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
                        const width = Math.round(img.width * ratio);
                        const height = Math.round(img.height * ratio);

                        const canvas = document.createElement("canvas");
                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext("2d");
                        if (!ctx) {
                            reject(new Error("canvas-not-supported"));
                            return;
                        }

                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL("image/jpeg", 0.82));
                    };
                    img.onerror = () => reject(new Error("image-load-failed"));
                    img.src = reader.result;
                };

                reader.onerror = () => reject(new Error("file-read-failed"));
                reader.readAsDataURL(file);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const loginInput = document.getElementById('displayLogin');
            const nicknameInput = document.getElementById('displayNickname');
            const passInput = document.getElementById('displayPassword');
            const avatarInput = document.getElementById('avatarInput');
            const changeAvatarBtn = document.getElementById('changeAvatarBtn');
            let pendingAvatarDataUrl = null;

            function syncAdminLink(user) {
                const sideMenu = document.querySelector(".side-menu");
                const existingLink = document.getElementById("adminPanelLink");

                if (isAdminUser(user)) {
                    if (!existingLink) {
                        const adminLink = document.createElement("a");
                        adminLink.id = "adminPanelLink";
                        adminLink.href = "/pages/admin.html";
                        adminLink.textContent = "Админка";
                        sideMenu.appendChild(adminLink);
                    }
                } else if (existingLink) {
                    existingLink.remove();
                }
            }

            // Проверка авторизации и загрузка данных из Firebase
            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    window.location.href = '/pages/login.html';
                    return;
                }

                syncAdminLink(user);

                let userData = {};

                try {
                    const userDoc = await db.collection("users").doc(user.uid).get();
                    if (userDoc.exists) {
                        userData = userDoc.data() || {};
                    }
                } catch (error) {
                    console.error("Ошибка загрузки профиля:", error);
                }

                renderProfileHeader(user, userData);
            });

            // Показать/скрыть пароль
            document.getElementById('togglePassword').onclick = () => {
                passInput.type = passInput.type === 'password' ? 'text' : 'password';
            };

            changeAvatarBtn.onclick = () => {
                avatarInput.click();
            };

            avatarInput.onchange = async (event) => {
                const file = event.target.files?.[0];
                if (!file) {
                    return;
                }

                if (!file.type.startsWith("image/")) {
                    showToast("Нужно выбрать изображение.", "error");
                    return;
                }

                try {
                    pendingAvatarDataUrl = await compressImageToDataUrl(file);
                    document.getElementById('avatarImage').src = pendingAvatarDataUrl;
                    showToast("Аватар готов к сохранению.", "success");
                } catch (error) {
                    console.error("Ошибка обработки аватара:", error);
                    pendingAvatarDataUrl = null;
                    showToast("Не удалось обработать изображение.", "error");
                }
            };

            document.getElementById('saveChanges').onclick = async () => {
                const user = auth.currentUser;
                if (!user) {
                    showToast("Вы не авторизованы", "error");
                    return;
                }

                const nickname = nicknameInput.value.trim();
                const newPassword = passInput.value.trim();

                if (!nickname) {
                    showToast("Введите никнейм.", "error");
                    return;
                }

                if (newPassword && newPassword.length < 6) {
                    showToast("Пароль должен быть минимум 6 символов", "error");
                    return;
                }

                try {
                    const userDocPayload = {
                        nickname: nickname,
                        email: loginInput.value.trim() || user.email || "",
                        uid: user.uid,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    if (pendingAvatarDataUrl) {
                        userDocPayload.avatarDataUrl = pendingAvatarDataUrl;
                    }

                    await db.collection("users").doc(user.uid).set(userDocPayload, { merge: true });

                    if (newPassword) {
                        await user.updatePassword(newPassword);
                        passInput.value = '';
                    }

                    renderProfileHeader(user, {
                        nickname: nickname,
                        email: loginInput.value.trim() || user.email || "",
                        avatarDataUrl: pendingAvatarDataUrl || document.getElementById('avatarImage').src
                    });

                    pendingAvatarDataUrl = null;
                    showToast("Профиль успешно обновлён!", "success");
                } catch (error) {
                    console.error(error);
                    if (error.code === 'auth/requires-recent-login') {
                        showToast("Для смены пароля войдите заново", "error");
                        setTimeout(() => { auth.signOut(); window.location.href = '/pages/login.html'; }, 2000);
                    } else {
                        showToast("Ошибка обновления пароля", "error");
                    }
                }
            };
        });
    </script>
</body>
</html>
