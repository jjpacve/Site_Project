<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Kazakh Quiz</title>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <script src="/scripts/theme.js?v=20260410d"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo-pin">
                <div class="logo-circle"><span>K</span><span>Q</span></div>
            </div>
        </div>

        <div class="form-container">
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login" placeholder="example@mail.com" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <div class="input-group">
                    <div class="spacer"></div>
                    <button type="submit" class="submit-btn">Войти</button>
                </div>
            </form>

            <div class="social-login">
                <p>Или используй быстрый вход:</p>
                <button type="button" id="googleLoginBtn" class="google-btn">
                    Войти через Google
                </button>
            </div>

            <div class="social-login">
                <p>Нет аккаунта?</p>
                <a href="/index.html">Перейти к регистрации</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="/scripts/firebase-init.js?v=20260415a"></script>
    <script src="/scripts/auth.js?v=20260409c"></script>
    <script src="/scripts/login.js?v=20260409a"></script>
</body>
</html>
